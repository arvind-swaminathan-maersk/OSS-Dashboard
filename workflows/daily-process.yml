name: Continuous Data Processing & Dashboard Update

on:
  # Watch Data folder for new Excel files
  push:
    paths:
      - 'Data/*.xlsx'
      - 'Data/*.xls'
  
  # Daily trigger as fallback
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  auto-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl watchdog
      
      - name: Detect and process new Excel files
        run: |
          python watch_and_process.py --single-run
      
      - name: Build dashboard
        run: |
          python build_dashboard.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add generated files
          git add -A
          
          # Only commit if there are changes
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-process new data and update dashboard [skip ci]"
            git push
          fi
      
      - name: Upload logs and output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processing-output
          path: |
            output/
            Data/process.log
            Data/processed/
          retention-days: 30
